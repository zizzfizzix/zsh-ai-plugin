services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:debian
    network_mode: "service:claude-proxy"
    depends_on:
      claude-proxy:
        condition: service_healthy
    volumes:
      - ..:/zsh-ai-plugin:cached
      - /zsh-ai-plugin/.devcontainer/.data/proxy # anonymous volume shadows real credentials
      - ./.data/history:/commandhistory
      - ./.data/claude:/home/vscode/.claude
      - ./.data/certs:/proxy-certs:ro
    environment:
      TZ: ${TZ:-UTC}
      NODE_EXTRA_CA_CERTS: "/proxy-certs/mitmca.pem"
      CLAUDE_CONFIG_DIR: /home/vscode/.claude
      POWERLEVEL9K_DISABLE_GITSTATUS: "true"
      SSL_CERT_FILE: "/etc/ssl/certs/ca-certificates.crt"
      REQUESTS_CA_BUNDLE: "/etc/ssl/certs/ca-certificates.crt"
    command: sleep infinity

  claude-proxy:
    build:
      context: ./proxy
    cap_add:
      - NET_ADMIN
    environment:
      UNRESTRICTED_NETWORK: "true"
    volumes:
      - ./.data/proxy:/data
      - ./.data/certs:/certs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3100/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
